# .github/workflows/security.yml
#
# PER-REPO caller. Drop this into every repo that should run the
# centralized security stack. Triggers live here; logic lives in
# greglamb/gha-workflows.
#
# Pin to a tag (recommended) or a commit SHA for stability.
# Use @main only during initial rollout / development.

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Mon 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: read

jobs:
  security:
    uses: greglamb/gha-workflows/.github/workflows/lib-security-review.yml@v0.2605.0501
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: read
    # Optional overrides:
    # with:
    #   runner-os: "ubuntu-24.04"          # bump to ubuntu-26.04 once available on GHA
    #   opengrep-version: "v1.16.0"        # tag-pinned; install.sh + binary verified together
    #   rules-ref: "<sha>"                 # semgrep-rules SHA; bump after diff review
    #   opengrep-extra-configs: "./security/rules ./opengrep/cfml.yml"
    #   opengrep-generic-rules: "./opengrep/generic"  # for languages OpenGrep doesn't parse natively
    #   trivy-severity: "CRITICAL,HIGH"
    #   enable-trufflehog: false
