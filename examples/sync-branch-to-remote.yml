name: Sync branch to remote

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Git URL of source repo (required)"
        required: true
        default: "https://github.com/repoorg/reponame.git"
      source_ref:
        description: "Source branch or ref to mirror (required)"
        required: true
        default: "main"
      target_ref:
        description: "Target branch (created/overwritten, required)"
        required: true
        default: "upstream/repoorg"
      disable_workflows:
        description: "Remove .github/workflows from mirrored branch"
        required: true
        type: boolean
        default: true

# Optional schedule per-repo
  schedule:
    - cron: "0 2 * * 1"

jobs:
  call-sync:
    uses: greglamb/gha-workflows/.github/workflows/sync-branch-to-remote.yml@v1
    with:
      source_repo: ${{ inputs.source_repo }}
      source_ref: ${{ inputs.source_ref }}
      target_ref: ${{ inputs.target_ref }}
      disable_workflows: ${{ inputs.disable_workflows }}
    permissions:
      contents: write